services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/ecommerce
      DATABASE_USERNAME: ecommerce
      DATABASE_PASSWORD: ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-development-secret-key-change-before-production
      STRIPE_SECRET_KEY: sk_test_local_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_local_placeholder
      FRONTEND_URL: http://localhost:5173
      ORDER_EXPIRATION_MINUTES: 30
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../ecommerce-frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:
