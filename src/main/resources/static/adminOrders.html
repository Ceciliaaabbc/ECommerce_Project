<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders</title>
    <link rel="stylesheet" href="/adminOrders.css">
</head>
<body>
    <h1>Admin Order Management</h1>

    <a href="/admin.html">Back to Admin Products</a>
    <br><br>

    <div id="orders"></div>

    <script>
        const userRole = localStorage.getItem("userRole");

        if (userRole !== "ADMIN") {
            alert("You are not admin");
            window.location.href = "/products.html";
        }

        async function loadOrders() {
            const userEmail = localStorage.getItem("userEmail");

            const response = await fetch(
                "http://localhost:8080/api/orders?userEmail=" + userEmail
            );

            const orders = await response.json();

            const ordersDiv = document.getElementById("orders");
            ordersDiv.innerHTML = "";

            orders.forEach(order => {
                const div = document.createElement("div");

                div.innerHTML = `
                    <h3>Order ID: ${order.id}</h3>
                    <p>User: ${order.userEmail}</p>
                    <p>Total: ${order.total}</p>
                    <p>Current Status: ${order.status}</p>

                    <select id="status-${order.id}">
                        <option value="PENDING">PENDING</option>
                        <option value="PAID">PAID</option>
                        <option value="SHIPPED">SHIPPED</option>
                        <option value="COMPLETED">COMPLETED</option>
                        <option value="CANCELLED">CANCELLED</option>
                    </select>

                    <button onclick="updateStatus(${order.id})">
                        Update Status
                    </button>

                    <hr>
                `;

                ordersDiv.appendChild(div);
            });
        }

        async function updateStatus(orderId) {
            const status = document.getElementById("status-" + orderId).value;

            await fetch(
                "/api/orders/" + orderId + "/status?status=" + status,
                {
                    method: "PUT"
                }
            );

            alert("Order status updated");
            loadOrders();
        }

        loadOrders();
    </script>
</body>
</html>
