<!DOCTYPE html>
<html>
<head>
    <title>Admin Product Management</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
    <h1>Admin Product Management</h1>

    <a href="/products.html">Back to Products</a>

    <h2>Add Product</h2>

    <input id="title" placeholder="Product title">
    <br><br>

    <input id="category" placeholder="Category">
    <br><br>

    <input id="description" placeholder="Description">
    <br><br>

    <input id="price" type="number" placeholder="Price">
    <br><br>

    <input id="imageUrl" placeholder="Image URL">
    <br><br>

    <input id="stock" type="number" placeholder="Stock">
    <br><br>

    <button onclick="addProduct()">Add Product</button>

    <p id="message"></p>

    <hr>

    <h2>All Products</h2>

    <div id="products"></div>


    <br><br>
    <a href="/adminOrders.html">Manage Orders</a>

    <script>

        const userRole = localStorage.getItem("userRole");

        if (userRole !== "ADMIN") {
            alert("You are not admin");
            window.location.href = "/products.html";
        }

        async function addProduct() {
            const title = document.getElementById("title").value;
            const category = document.getElementById("category").value;
            const description = document.getElementById("description").value;
            const price = Number(document.getElementById("price").value);
            const imageUrl = document.getElementById("imageUrl").value;
            const stock = Number(document.getElementById("stock").value);

            const adminEmail = localStorage.getItem("userEmail");
            
            const token = localStorage.getItem("token");

            const response = await fetch("/api/products", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    title: title,
                    category: category,
                    description: description,
                    price: price,
                    imageUrl: imageUrl,
                    stock: stock
                })
            });

            const product = await response.json();

            document.getElementById("message").innerText =
                "Product added: " + product.title;

            document.getElementById("title").value = "";
            document.getElementById("category").value = "";
            document.getElementById("description").value = "";
            document.getElementById("price").value = "";
            document.getElementById("imageUrl").value = "";
            document.getElementById("stock").value = "";

            loadProducts();
        }

   
        async function loadProducts() {
            const response = await fetch("/api/products");
            const products = await response.json();

            const productsDiv = document.getElementById("products");
            productsDiv.innerHTML = "";

            products.forEach(product => {
                const div = document.createElement("div");

            div.innerHTML = `
                <h3>${product.title}</h3>

                <img 
                    src="${product.imageUrl}" 
                    alt="${product.title}" 
                    width="150"
                >

                <p>Category: ${product.category}</p>
                <p>${product.description}</p>
                <p>Price: ${product.price}</p>
                <p>Stock: ${product.stock}</p>

                <input id="title-${product.id}" value="${product.title}">
                <br><br>

                <input id="category-${product.id}" value="${product.category}">
                <br><br>

                <input id="description-${product.id}" value="${product.description}">
                <br><br>

                <input id="price-${product.id}" type="number" value="${product.price}">
                <br><br>

                <input id="imageUrl-${product.id}" value="${product.imageUrl}">
                <br><br>

                <input id="stock-${product.id}" type="number" value="${product.stock}">
                <br><br>

                <button onclick="updateProduct(${product.id})">Update</button>
                <button onclick="deleteProduct(${product.id})">Delete</button>

                <hr>
            `;
            productsDiv.appendChild(div);
        });
    }

        async function deleteProduct(id) {
            const adminEmail = localStorage.getItem("userEmail");

            const token = localStorage.getItem("token");

            await fetch("/api/products/" + id, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });
            loadProducts();
        }
        async function updateProduct(id) {
            const title = document.getElementById("title-" + id).value;
            const category = document.getElementById("category-" + id).value;
            const description = document.getElementById("description-" + id).value;
            const price = Number(document.getElementById("price-" + id).value);
            const imageUrl = document.getElementById("imageUrl-" + id).value;
            const stock = Number(document.getElementById("stock-" + id).value);


            const adminEmail = localStorage.getItem("userEmail");

            const token = localStorage.getItem("token");

            await fetch("/api/products/" + id, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    title: title,
                    category: category,
                    description: description,
                    price: price,
                    imageUrl: imageUrl,
                    stock: stock
                })
            });

            alert("Product updated");
            loadProducts();
        }

        loadProducts();
    </script>
</body>
</html>
